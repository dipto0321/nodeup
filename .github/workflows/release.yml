# Release workflow for nodeup.
#
# Triggered ONLY on `v*.*.*` tag push (annotated or lightweight). Steps:
#
#   1. Checkout at full depth so GoReleaser can read every commit.
#   2. Set up Go with the same version pin as CI.
#   3. Run `goreleaser release --clean` which:
#        - Builds all 5 platform binaries (linux/darwin/windows × amd64/arm64,
#          minus the windows/arm64 entry that's excluded in .goreleaser.yaml)
#        - Generates SHA256 checksums
#        - Creates a GitHub Release with an auto-generated changelog
#        - Pushes to the homebrew-tap repo (if HOMEBREW_TAP_TOKEN is set)
#        - Pushes to the scoop-bucket repo (if SCOOP_BUCKET_TOKEN is set)
#   4. Publish the nodeup-cli npm wrapper via OIDC Trusted Publishing.
#      GitHub Actions exchanges its built-in OIDC token for a one-hour
#      publish token scoped to the `nodeup-cli` package. No NPM_TOKEN
#      secret, no rotation, no leak surface.
#
# Required secrets (configured per-repo):
#   - HOMEBREW_TAP_TOKEN: fine-grained PAT with `contents:write` on
#     github.com/dipto0321/homebrew-tap
#   - SCOOP_BUCKET_TOKEN: same on github.com/dipto0321/scoop-bucket
#   - GITHUB_TOKEN: provided automatically by GitHub Actions, used by
#     GoReleaser to create the Release.
#
# npm publish uses OIDC Trusted Publishing — no secret required. The
# trust is registered on the npmjs.com side at
#   https://www.npmjs.com/package/nodeup-cli/access
# under "Trusted Publisher", pointing at this workflow by filename
# (release.yml). If the publish job ever fails with ENEEDAUTH, the
# first thing to check is that the trust entry on npmjs.com still
# matches this workflow's filename, repo name, and GitHub user/org.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write # required to create the GitHub Release

# Don't cancel a release mid-publish — partial state is bad.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          # MUST match `go.mod`'s `go` directive (currently 1.24.0)
          # AND `.github/workflows/ci.yml`'s lint job — the test
          # jobs use `go-version-file: 'go.mod'` which auto-derives,
          # so we have to keep this in sync by hand. With Go's
          # default `GOTOOLCHAIN=auto`, a too-old pin here would
          # "self-heal" via auto-download — masking the divergence
          # from CI but silently depending on network access to
          # proxy.golang.org at release time, and breaking outright
          # if `GOTOOLCHAIN=local` is ever set (org policy, air-
          # gapped runner). See #66.
          go-version: '1.24'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}

  publish-npm:
    name: Publish nodeup-cli to npm (OIDC)
    runs-on: ubuntu-latest
    needs: goreleaser
    # OIDC Trusted Publishing — the trust is registered on the npmjs.com
    # side at https://www.npmjs.com/package/nodeup-cli/access under
    # "Trusted Publisher", pointing at this workflow by filename. No
    # NPM_TOKEN secret is needed; the runner mints an OIDC token,
    # npmjs.com exchanges it for a one-hour publish token scoped to
    # the nodeup-cli package.
    #
    # IMPORTANT: OIDC only kicks in when npm sees NO `_authToken` line
    # in .npmrc for the target registry. The actions/setup-node action
    # writes `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` to
    # .npmrc when given `registry-url`, and an empty-expanded value
    # still counts as "auth configured" — npm then tries classic auth
    # with empty creds and never initiates the OIDC exchange (issue
    # npm/documentation#1960). So we deliberately:
    #   1. Don't set `registry-url` on setup-node.
    #   2. Don't set NODE_AUTH_TOKEN in the env.
    #   3. Write a clean .npmrc with only the registry URL.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write # required for OIDC trusted publishing
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 24 ships npm 11.x, which is the minimum for OIDC
          # trusted publishing (npm >= 11.5.1, Node >= 22.14.0).
          # Deliberately no `registry-url` here — see the comment on
          # the publish-npm job above.
          node-version: '24'

      # Write a clean .npmrc that contains only the registry URL, no
      # _authToken line. Without this, npm won't see the
      # ACTIONS_ID_TOKEN_REQUEST_* env vars and won't initiate the
      # OIDC token exchange.
      - name: Configure registry (clean .npmrc for OIDC)
        run: |
          mkdir -p ~/.npm
          printf 'registry=https://registry.npmjs.org/\n' > ~/.npmrc

      - name: Publish nodeup-cli
        working-directory: ./nodeup-npm
        run: npm publish --access public