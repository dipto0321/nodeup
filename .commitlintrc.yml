---
# commitlint configuration for nodeup.
#
# Enforces Conventional Commits (https://www.conventionalcommits.org/).
# CI runs `wagoid/commitlint-github-action@v5` against every commit in
# a PR; local devs can run `npx commitlint --edit` to lint the staged
# message.

extends:
  - '@commitlint/config-conventional'

rules:
  # Scopes are project-specific. The core set comes from the package
  # layout (detector, cli, platform, ...); extras: "deps" for
  # dependency bumps, "release" for release-prep commits.
  scope-enum:
    - 2
    - always
    - - detector
      - manager
      - packages
      - node
      - config
      - ui
      - platform
      - cli
      - deps
      - release
      - ci
      - docs
      - lint
  # Type whitelist matches Conventional Commits.
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - docs
      - style
      - refactor
      - perf
      - test
      - build
      - ci
      - chore
      - revert
  # Subject must be <= 100 chars (matches @commitlint/config-conventional
# default and the GitHub web UI's truncation point at ~72 chars on the
# timeline but full visibility at 100 in the commit-detail view).
  header-max-length:
    - 2
    - always
    - 100
  # Subject case: forbid capitalized sentence-style and PascalCase / UPPERCASE.
# Inherits the conventional-commits default (the negated "must NOT be"
# rule). Plain lowercase is fine, but so is "My thing" — this is the
# canonical pattern and matches every commit we've made so far.
  subject-case:
    - 2
    - never
    - - sentence-case
      - start-case
      - pascal-case
      - upper-case
  # No trailing period on subject — conventional commits norm.
  # NOTE: the rule tuple is `[level, when, value]` where `value` is the
  # character to check for (default "."). To forbid trailing periods,
  # set `when: never` and `value: "."`. The historical gotcha is that
  # the string "never" is the *when* argument, NOT the value.
  subject-full-stop:
    - 2
    - never
    - '.'
  # Body lines wrap at 100 cols for hand-authored commit messages.
  # Footers (the trailing "Closes #N. ..." / "Part of #N. ..." blocks
  # that admin squash-merge appends) get a separate, larger budget —
  # the squash message can pull a long PR-description summary into the
  # footer, and 100 cols there is too tight. 200 is plenty (longest
  # footer historically: ~125 chars for "Part of #105. ... PR4 ... to
  # follow in this same issue.") while still bounding pathological
  # autogenerated walls of text.
  body-max-line-length:
    - 2
    - always
    - 100
  footer-max-line-length:
    - 2
    - always
    - 200